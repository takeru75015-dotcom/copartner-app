<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}財務KPI分析{% endblock %} | CoPartner</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  /* ========== Raksul-inspired color tokens ========== */
  :root {
    --rk-navy: #1A1A2E;          /* メインダーク */
    --rk-navy-light: #2D2D4A;
    --rk-pink: #E81E5C;          /* アクセント */
    --rk-pink-light: #FF4D7E;
    --rk-bg: #FAFAFA;            /* ページ背景 */
    --rk-card: #FFFFFF;          /* カード */
    --rk-border: #E5E7EB;
    --rk-text: #1F2937;
    --rk-text-muted: #6B7280;
  }
  body { background: var(--rk-bg); font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; color: var(--rk-text); }
  .navbar { background: var(--rk-navy) !important; }
  .navbar-brand { font-weight: 700; font-size: 1.3rem; letter-spacing: 0.03em; color: #fff !important; }
  .navbar-brand i { color: var(--rk-pink); }
  .card { border: 1px solid var(--rk-border); box-shadow: 0 1px 3px rgba(0,0,0,.04); border-radius: 12px; background: var(--rk-card); }
  .btn-primary, .btn-primary:hover { background: var(--rk-navy); border-color: var(--rk-navy); }
  .btn-outline-light:hover { background: rgba(255,255,255,.1); }
  a { color: var(--rk-pink); }
  a:hover { color: var(--rk-pink-light); }
  .text-primary { color: var(--rk-navy) !important; }
  .score-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; color: #fff; }
  .priority-high { background: #fee2e2; color: #dc2626; border-radius: 6px; padding: 2px 8px; }
  .priority-mid  { background: #fef9c3; color: #ca8a04; border-radius: 6px; padding: 2px 8px; }
  .priority-low  { background: #dcfce7; color: #16a34a; border-radius: 6px; padding: 2px 8px; }
  .kpi-card { border-left: 4px solid var(--rk-pink); }
  .strength-item { border-left: 3px solid #22c55e; padding-left: .75rem; margin-bottom: .5rem; }
  .issue-item    { border-left: 3px solid var(--rk-pink); padding-left: .75rem; margin-bottom: .5rem; }
  h5.fw-bold, h6.fw-bold { color: var(--rk-navy); }
</style>
{% block head %}{% endblock %}
</head>
<body>
{% if user %}
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/dashboard"><i class="fas fa-chart-line me-2"></i>CoPartner</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white-50 small"><i class="fas fa-user me-1"></i>{{ user.display_name or user.username }}</span>
      <a href="/settings" class="btn btn-outline-light btn-sm"><i class="fas fa-cog me-1"></i>設定</a>
      <a href="/logout" class="btn btn-outline-light btn-sm">ログアウト</a>
    </div>
  </div>
</nav>
{% endif %}
<div class="container py-4">
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
