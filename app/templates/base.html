<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}財務KPI分析{% endblock %} | CoPartner</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  /* ========== Raksul-inspired tokens（黒×白×差し色） ========== */
  :root {
    --rk-black: #0F0F19;         /* ヒーロー黒 */
    --rk-dark: #1A1A2E;          /* 見出し・濃グレー */
    --rk-accent: #E60039;        /* Raksul Red（強調アクセント） */
    --rk-accent-soft: #FFE4EB;
    --rk-bg: #FFFFFF;            /* ページ背景は純白 */
    --rk-bg-alt: #F7F7F9;        /* 弱い区切り背景 */
    --rk-card: #FFFFFF;
    --rk-border: #E5E7EB;
    --rk-text: #0F0F19;
    --rk-text-muted: #6B7280;
  }
  body { background: var(--rk-bg); font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; color: var(--rk-text); }
  .navbar { background: var(--rk-black) !important; border-bottom: 3px solid var(--rk-accent); }
  .navbar-brand { font-weight: 800; font-size: 1.4rem; letter-spacing: 0.05em; color: #fff !important; }
  .navbar-brand i { color: var(--rk-accent); }
  .card { border: 1px solid var(--rk-border); box-shadow: none; border-radius: 8px; background: var(--rk-card); }
  .btn-primary, .btn-primary:hover { background: var(--rk-black); border-color: var(--rk-black); }
  .btn-outline-light:hover { background: rgba(255,255,255,.1); }
  a { color: var(--rk-accent); text-decoration: none; }
  a:hover { color: var(--rk-accent); text-decoration: underline; }
  .text-primary { color: var(--rk-black) !important; }
  .score-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; color: #fff; }
  .priority-high { background: var(--rk-accent-soft); color: var(--rk-accent); border-radius: 6px; padding: 2px 8px; font-weight: 700; }
  .priority-mid  { background: #fef9c3; color: #ca8a04; border-radius: 6px; padding: 2px 8px; font-weight: 700; }
  .priority-low  { background: #f3f4f6; color: #374151; border-radius: 6px; padding: 2px 8px; font-weight: 700; }
  .kpi-card { border-left: 4px solid var(--rk-accent); }
  .strength-item { border-left: 3px solid #22c55e; padding-left: .75rem; margin-bottom: .5rem; }
  .issue-item    { border-left: 3px solid var(--rk-accent); padding-left: .75rem; margin-bottom: .5rem; }
  h1, h2, h3, h4, h5, h6 { color: var(--rk-black); font-weight: 800; letter-spacing: 0.02em; }
  /* Raksul風ヒーローセクション（黒背景 + 巨大数字） */
  .rk-hero { background: var(--rk-black); color: #fff; border-radius: 12px; padding: 32px 28px; margin-bottom: 24px; }
  .rk-hero h1, .rk-hero h2, .rk-hero h3, .rk-hero h4, .rk-hero h5 { color: #fff; }
  .rk-hero .rk-big-num { font-size: 3rem; font-weight: 900; line-height: 1.1; letter-spacing: -0.02em; }
  .rk-hero .rk-big-num small { font-size: 1rem; font-weight: 600; color: #94a3b8; margin-left: 6px; }
  .rk-hero .rk-label { font-size: .85rem; color: #94a3b8; font-weight: 600; letter-spacing: .05em; }
  .rk-accent { color: var(--rk-accent); }
  /* セクション見出し */
  .rk-section-title { display: flex; align-items: center; gap: 10px; font-size: 1.15rem; font-weight: 800; color: var(--rk-black); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--rk-black); }
  .rk-section-title .rk-section-bar { display: inline-block; width: 4px; height: 22px; background: var(--rk-accent); }
</style>
{% block head %}{% endblock %}
</head>
<body>
{% if user %}
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/dashboard"><i class="fas fa-chart-line me-2"></i>CoPartner</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white-50 small"><i class="fas fa-user me-1"></i>{{ user.display_name or user.username }}</span>
      <a href="/settings" class="btn btn-outline-light btn-sm"><i class="fas fa-cog me-1"></i>設定</a>
      <a href="/logout" class="btn btn-outline-light btn-sm">ログアウト</a>
    </div>
  </div>
</nav>
{% endif %}
<div class="container py-4">
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
