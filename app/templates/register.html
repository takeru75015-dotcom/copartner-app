{% extends 'base.html' %}
{% block title %}新規登録{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="text-center mb-4">
      <h2 class="fw-bold" style="color:#1a237e;"><i class="fas fa-chart-line me-2"></i>CoPartner</h2>
      <p class="text-muted">アカウント作成</p>
    </div>
    <div class="card p-4">
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <form method="post" action="/register">
        <div class="mb-3">
          <label class="form-label fw-semibold">表示名（事務所名など）</label>
          <input type="text" name="display_name" class="form-control" placeholder="例: 山田税理士事務所">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">ユーザー名</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">パスワード</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100" style="background:#1a237e;border-color:#1a237e;">
          <i class="fas fa-user-plus me-2"></i>登録する
        </button>
      </form>
      <hr>
      <div class="text-center">
        <a href="/login" class="text-decoration-none">既にアカウントをお持ちの方</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
