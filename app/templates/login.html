{% extends 'base.html' %}
{% block title %}ログイン{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="text-center mb-4">
      <h2 class="fw-bold" style="color:#1a237e;"><i class="fas fa-chart-line me-2"></i>Taxel</h2>
      <p class="text-muted">税理士向け 財務AI分析サービス</p>
    </div>
    <div class="card p-4">
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">ユーザー名</label>
          <input type="text" name="username" class="form-control form-control-lg" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">パスワード</label>
          <input type="password" name="password" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100" style="background:#1a237e;border-color:#1a237e;">
          <i class="fas fa-sign-in-alt me-2"></i>ログイン
        </button>
      </form>
      <hr>
      <div class="text-center">
        <a href="/register" class="text-decoration-none">アカウント新規作成</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
